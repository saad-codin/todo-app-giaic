# Default values for todo-chatbot Helm chart
# This is a YAML-formatted file.

# Frontend configuration (Next.js with ChatKit)
frontend:
  replicaCount: 1
  image:
    repository: todo-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  env:
    NEXT_PUBLIC_API_URL: "http://backend-svc:8000"
    NEXT_PUBLIC_CHATKIT_DOMAIN_KEY: ""
    NEXT_PUBLIC_WS_URL: "ws://sync-svc:8003"

# Backend configuration (FastAPI with Agents SDK + Dapr)
backend:
  replicaCount: 1
  image:
    repository: todo-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  env:
    FRONTEND_URL: "http://frontend-svc:3000"
  # Secrets - override these in values-local.yaml
  secrets:
    DATABASE_URL: ""
    OPENAI_API_KEY: ""
    JWT_SECRET: ""
    BETTER_AUTH_SECRET: ""

# Reminder service configuration
reminder:
  replicaCount: 1
  image:
    repository: reminder-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Recurring service configuration
recurring:
  replicaCount: 1
  image:
    repository: recurring-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Sync service configuration
sync:
  replicaCount: 1
  image:
    repository: sync-service
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Redpanda (Kafka-compatible message broker)
redpanda:
  enabled: true  # Set to false for cloud deployment
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  cloud:
    enabled: false
    bootstrapServers: ""

# Common configuration
common:
  namespace: todo-chatbot
  labels:
    app.kubernetes.io/name: todo-chatbot
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: Helm

{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: {{ .Values.common.namespace }}
  labels:
    app: redpanda
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: "{{ .Values.redpanda.image.repository }}:{{ .Values.redpanda.image.tag }}"
          args:
            - redpanda
            - start
            - --mode
            - dev-container
            - --smp
            - "1"
            - --memory
            - 256M
            - --overprovisioned
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://redpanda.{{ .Values.common.namespace }}.svc.cluster.local:9092
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: admin
              containerPort: 9644
              protocol: TCP
            - name: schema
              containerPort: 8081
              protocol: TCP
          resources:
            {{- toYaml .Values.redpanda.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 15
            periodSeconds: 15
{{- end }}

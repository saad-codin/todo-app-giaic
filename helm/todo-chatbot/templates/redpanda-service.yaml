{{- if .Values.redpanda.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: {{ .Values.common.namespace }}
  labels:
    app: redpanda
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: 9644
      protocol: TCP
    - name: schema
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: redpanda
{{- end }}

# CI/CD Pipeline: Build all 5 images, push to ACR, deploy to AKS
# Trigger: push to main branch or manual dispatch

name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: todoappcr2025
  AKS_CLUSTER: todo-aks
  RESOURCE_GROUP: todo-app-rg
  NAMESPACE: todo-chatbot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/todo-backend:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/todo-backend:latest \
            ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/todo-backend --all-tags

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/todo-frontend:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/todo-frontend:latest \
            ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/todo-frontend --all-tags

      - name: Build and push reminder-service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/reminder-service:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/reminder-service:latest \
            ./services/reminder
          docker push ${{ env.ACR_NAME }}.azurecr.io/reminder-service --all-tags

      - name: Build and push recurring-service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/recurring-service:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/recurring-service:latest \
            ./services/recurring
          docker push ${{ env.ACR_NAME }}.azurecr.io/recurring-service --all-tags

      - name: Build and push sync-service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/sync-service:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/sync-service:latest \
            ./services/sync
          docker push ${{ env.ACR_NAME }}.azurecr.io/sync-service --all-tags

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install todo-chatbot ./helm/todo-chatbot \
            -f helm/todo-chatbot/values-cloud.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set reminder.image.tag=${{ github.sha }} \
            --set recurring.image.tag=${{ github.sha }} \
            --set sync.image.tag=${{ github.sha }} \
            --set redpanda.cloud.bootstrapServers=${{ secrets.REDPANDA_BOOTSTRAP_SERVERS }} \
            --set backend.secrets.DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --set backend.secrets.OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --set backend.secrets.JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --set backend.secrets.BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }} \
            -n ${{ env.NAMESPACE }} \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo "Checking health endpoints..."
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=120s
